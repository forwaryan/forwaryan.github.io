<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">MIT 6.5840 architecture flow</title>
  <desc id="desc">Architecture diagram for MIT 6.5840 labs, from MapReduce to KVRaft and ShardKV.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .blue { fill: #eaf3ff; stroke: #6ea8fe; }
      .amber { fill: #fff7e6; stroke: #e5b75d; }
      .green { fill: #edf8ef; stroke: #79bf88; }
      .red { fill: #fff0f0; stroke: #e08989; }
      .title { font: 700 28px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .head { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .label { font: 15px Arial, "Microsoft YaHei", sans-serif; fill: #253247; }
      .small { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #526070; }
      .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1120" height="680"/>
  <text x="560" y="48" text-anchor="middle" class="title">MIT 6.5840：从不可靠 RPC 到分片 KV</text>

  <rect x="70" y="90" width="430" height="205" rx="16" class="box"/>
  <text x="285" y="126" text-anchor="middle" class="head">Lab 1：MapReduce</text>
  <rect x="105" y="158" width="120" height="54" rx="10" class="blue"/>
  <text x="165" y="181" text-anchor="middle" class="label">Coordinator</text>
  <text x="165" y="199" text-anchor="middle" class="small">任务状态</text>
  <rect x="330" y="130" width="120" height="54" rx="10" class="green"/>
  <text x="390" y="153" text-anchor="middle" class="label">Map Worker</text>
  <text x="390" y="171" text-anchor="middle" class="small">中间文件</text>
  <rect x="330" y="220" width="120" height="54" rx="10" class="green"/>
  <text x="390" y="243" text-anchor="middle" class="label">Reduce Worker</text>
  <text x="390" y="261" text-anchor="middle" class="small">最终输出</text>
  <path d="M225 178 C260 160, 285 154, 330 154" class="arrow"/>
  <path d="M225 194 C265 224, 292 242, 330 246" class="arrow"/>

  <rect x="620" y="90" width="430" height="205" rx="16" class="box"/>
  <text x="835" y="126" text-anchor="middle" class="head">Lab 3-4：Raft + KVRaft</text>
  <rect x="655" y="160" width="105" height="52" rx="10" class="blue"/>
  <text x="707" y="190" text-anchor="middle" class="label">Client</text>
  <rect x="805" y="160" width="105" height="52" rx="10" class="amber"/>
  <text x="857" y="181" text-anchor="middle" class="label">Leader</text>
  <text x="857" y="199" text-anchor="middle" class="small">Raft log</text>
  <rect x="955" y="160" width="70" height="52" rx="10" class="amber"/>
  <text x="990" y="181" text-anchor="middle" class="label">多数派</text>
  <text x="990" y="199" text-anchor="middle" class="small">commit</text>
  <rect x="805" y="230" width="220" height="42" rx="10" class="green"/>
  <text x="915" y="257" text-anchor="middle" class="label">apply 到 KV 状态机 + 去重表</text>
  <path d="M760 186 L805 186" class="arrow"/>
  <path d="M910 186 L955 186" class="arrow"/>
  <path d="M990 212 L990 230" class="arrow"/>
  <path d="M805 252 C740 252, 720 228, 708 212" class="dash"/>

  <rect x="70" y="365" width="980" height="240" rx="16" class="box"/>
  <text x="560" y="402" text-anchor="middle" class="head">Lab 5：ShardKV，把单组 Raft 正确性扩展到多组之间</text>
  <rect x="105" y="455" width="175" height="74" rx="12" class="blue"/>
  <text x="192" y="484" text-anchor="middle" class="label">ShardCtrler</text>
  <text x="192" y="506" text-anchor="middle" class="small">Join / Leave / Move / Query</text>

  <rect x="390" y="435" width="180" height="115" rx="12" class="amber"/>
  <text x="480" y="464" text-anchor="middle" class="label">Replica Group 1</text>
  <text x="480" y="486" text-anchor="middle" class="small">Raft 复制 shard 0,1,2</text>
  <text x="480" y="510" text-anchor="middle" class="small">Put / Append / Get</text>

  <rect x="735" y="435" width="180" height="115" rx="12" class="amber"/>
  <text x="825" y="464" text-anchor="middle" class="label">Replica Group 2</text>
  <text x="825" y="486" text-anchor="middle" class="small">Raft 复制 shard 3,4</text>
  <text x="825" y="510" text-anchor="middle" class="small">迁移后服务新 shard</text>

  <path d="M280 492 L390 492" class="arrow"/>
  <text x="335" y="475" text-anchor="middle" class="small">配置</text>
  <path d="M570 492 L735 492" class="dash"/>
  <text x="652" y="475" text-anchor="middle" class="small">Shard 数据 + 去重状态迁移</text>

  <rect x="372" y="570" width="390" height="34" rx="8" class="red"/>
  <text x="567" y="593" text-anchor="middle" class="label">难点：配置变更、用户请求、迁移 GC 必须排出一致顺序</text>
</svg>
