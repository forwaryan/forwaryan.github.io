<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" role="img" aria-label="Lab3B：Region Split 后状态如何收敛">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="470" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="422" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">Lab3B：Region Split 后状态如何收敛</text>
  
    <rect class="blue" x="70" y="145" width="175" height="84" rx="8"/><text class="label" x="157.5" y="181" text-anchor="middle"><tspan x="157.5" dy="0">Split Checker</tspan><tspan x="157.5" dy="22">发现 split key</tspan></text>
    <rect class="box" x="305" y="145" width="180" height="84" rx="8"/><text class="label" x="395" y="181" text-anchor="middle"><tspan x="395" dy="0">Scheduler</tspan><tspan x="395" dy="22">分配新 Region ID</tspan></text>
    <rect class="green" x="545" y="132" width="190" height="110" rx="8"/><text class="label" x="640" y="170" text-anchor="middle"><tspan x="640" dy="0">Admin command</tspan><tspan x="640" dy="22">进入当前 Region</tspan><tspan x="640" dy="22">Raft log</tspan></text>
    <rect class="amber" x="795" y="145" width="225" height="84" rx="8"/><text class="label" x="907.5" y="181" text-anchor="middle"><tspan x="907.5" dy="0">Apply Split</tspan><tspan x="907.5" dy="22">更新 regionRanges / meta</tspan></text>
    <path class="arrow" d="M 245 187 L 305 187"/><path class="arrow" d="M 485 187 L 545 187"/><path class="arrow" d="M 735 187 L 795 187"/>
    <rect class="box" x="180" y="305" width="210" height="58" rx="6"/><text class="small" x="285" y="329" text-anchor="middle"><tspan x="285" dy="0">旧 Region</tspan><tspan x="285" dy="18">[a, z)</tspan></text>
    <rect class="green" x="505" y="305" width="170" height="58" rx="6"/><text class="small" x="590" y="329" text-anchor="middle"><tspan x="590" dy="0">左 Region</tspan><tspan x="590" dy="18">[a, m)</tspan></text>
    <rect class="amber" x="730" y="305" width="170" height="58" rx="6"/><text class="small" x="815" y="329" text-anchor="middle"><tspan x="815" dy="0">右 Region</tspan><tspan x="815" dy="18">[m, z)</tspan></text>
    <path class="arrow" d="M 390 334 L 505 334"/><text class="small" x="447.5" y="322" text-anchor="middle"><tspan x="447.5" dy="0">元信息分裂</tspan></text><path class="arrow" d="M 675 334 L 730 334"/>
    <text class="caption" x="560" y="415" text-anchor="middle">难点在顺序：split 先作为 Raft 日志达成一致，commit 后才能改路由和本地元信息。</text>
  
</svg>
