<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-label="本地 TinyKV 文档到博客文章的覆盖关系">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="520" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="472" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">本地 TinyKV 文档到博客文章的覆盖关系</text>
  
    <rect class="blue" x="80" y="120" width="210" height="82" rx="8"/><text class="label" x="185" y="155" text-anchor="middle"><tspan x="185" dy="0">本地 README</tspan><tspan x="185" dy="22">项目总览 / 代码结构</tspan></text>
    <rect class="green" x="80" y="230" width="210" height="82" rx="8"/><text class="label" x="185" y="265" text-anchor="middle"><tspan x="185" dy="0">tinykv-understanding</tspan><tspan x="185" dy="22">Lab 中文笔记</tspan></text>
    <rect class="amber" x="80" y="340" width="210" height="82" rx="8"/><text class="label" x="185" y="375" text-anchor="middle"><tspan x="185" dy="0">interview-experiences</tspan><tspan x="185" dy="22">面经与问题映射</tspan></text>
    <rect class="blue" x="825" y="120" width="220" height="82" rx="8"/><text class="label" x="935" y="155" text-anchor="middle"><tspan x="935" dy="0">博客总览</tspan><tspan x="935" dy="22">项目怎么读</tspan></text>
    <rect class="green" x="825" y="230" width="220" height="82" rx="8"/><text class="label" x="935" y="265" text-anchor="middle"><tspan x="935" dy="0">Lab 1-4 系列</tspan><tspan x="935" dy="22">按实现顺序展开</tspan></text>
    <rect class="amber" x="825" y="340" width="220" height="82" rx="8"/><text class="label" x="935" y="375" text-anchor="middle"><tspan x="935" dy="0">面试准备系列</tspan><tspan x="935" dy="22">按问题和 Lab 反查</tspan></text>
    <path class="arrow" d="M 290 161 L 825 161"/><text class="small" x="557.5" y="149" text-anchor="middle"><tspan x="557.5" dy="0">改写成中文导读</tspan></text>
    <path class="arrow" d="M 290 271 L 825 271"/><text class="small" x="557.5" y="259" text-anchor="middle"><tspan x="557.5" dy="0">已按 Lab 发出</tspan></text>
    <path class="arrow" d="M 290 381 L 825 381"/><text class="small" x="557.5" y="369" text-anchor="middle"><tspan x="557.5" dy="0">补发到博客</tspan></text>
    <rect class="box" x="440" y="86" width="245" height="58" rx="6"/><text class="small" x="562.5" y="110" text-anchor="middle"><tspan x="562.5" dy="0">官方 Project 文档</tspan><tspan x="562.5" dy="18">只引用，不整段搬运</tspan></text>
    <rect class="box" x="440" y="424" width="245" height="58" rx="6"/><text class="small" x="562.5" y="448" text-anchor="middle"><tspan x="562.5" dy="0">第三方 btree README</tspan><tspan x="562.5" dy="18">依赖说明，不放进系列</tspan></text>
  
</svg>
