<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="TinyKV Lab 路线：从单机 KV 到事务存储层">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="500" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="452" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">TinyKV Lab 路线：从单机 KV 到事务存储层</text>
  
    <rect class="blue" x="80" y="145" width="190" height="100" rx="8"/><text class="label" x="175" y="178" text-anchor="middle"><tspan x="175" dy="0">Lab1</tspan><tspan x="175" dy="22">Standalone KV</tspan><tspan x="175" dy="22">本地 Badger 读写</tspan></text>
    <rect class="green" x="330" y="145" width="190" height="100" rx="8"/><text class="label" x="425" y="178" text-anchor="middle"><tspan x="425" dy="0">Lab2</tspan><tspan x="425" dy="22">RaftKV</tspan><tspan x="425" dy="22">复制状态机</tspan></text>
    <rect class="amber" x="580" y="145" width="190" height="100" rx="8"/><text class="label" x="675" y="178" text-anchor="middle"><tspan x="675" dy="0">Lab3</tspan><tspan x="675" dy="22">Multi-Raft</tspan><tspan x="675" dy="22">Region / 调度</tspan></text>
    <rect class="red" x="830" y="145" width="190" height="100" rx="8"/><text class="label" x="925" y="178" text-anchor="middle"><tspan x="925" dy="0">Lab4</tspan><tspan x="925" dy="22">Transactions</tspan><tspan x="925" dy="22">MVCC / Percolator</tspan></text>
    <path class="arrow" d="M 270 195 L 330 195"/><text class="small" x="300" y="183" text-anchor="middle"><tspan x="300" dy="0">把写入排序</tspan></text>
    <path class="arrow" d="M 520 195 L 580 195"/><text class="small" x="550" y="183" text-anchor="middle"><tspan x="550" dy="0">拆成多个组</tspan></text>
    <path class="arrow" d="M 770 195 L 830 195"/><text class="small" x="800" y="183" text-anchor="middle"><tspan x="800" dy="0">加并发语义</tspan></text>
    <rect class="box" x="95" y="315" width="160" height="58" rx="6"/><text class="small" x="175" y="339" text-anchor="middle"><tspan x="175" dy="0">Storage 接口</tspan><tspan x="175" dy="18">RawGet / RawScan</tspan></text>
    <rect class="box" x="345" y="315" width="160" height="58" rx="6"/><text class="small" x="425" y="339" text-anchor="middle"><tspan x="425" dy="0">Ready / Apply</tspan><tspan x="425" dy="18">Snapshot / GC</tspan></text>
    <rect class="box" x="595" y="315" width="160" height="58" rx="6"/><text class="small" x="675" y="339" text-anchor="middle"><tspan x="675" dy="0">Store / Peer</tspan><tspan x="675" dy="18">Split / Balance</tspan></text>
    <rect class="box" x="845" y="315" width="160" height="58" rx="6"/><text class="small" x="925" y="339" text-anchor="middle"><tspan x="925" dy="0">default / write / lock</tspan><tspan x="925" dy="18">Check / Resolve</tspan></text>
    <path class="arrow dashed" d="M 175 245 L 175 315"/><path class="arrow dashed" d="M 425 245 L 425 315"/><path class="arrow dashed" d="M 675 245 L 675 315"/><path class="arrow dashed" d="M 925 245 L 925 315"/>
    <text class="caption" x="560" y="425" text-anchor="middle">这条线的重点不是 API 越来越多，而是系统约束一层层变强：持久化、一致性、扩展性、事务性。</text>
  
</svg>
