<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-label="Lab3：Store、Peer、Region 和 Scheduler 的关系">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="620" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="572" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">Lab3：Store、Peer、Region 和 Scheduler 的关系</text>
  
    <rect class="blue" x="455" y="92" width="210" height="86" rx="8"/><text class="label" x="560" y="129" text-anchor="middle"><tspan x="560" dy="0">Scheduler</tspan><tspan x="560" dy="22">heartbeat / operator</tspan></text>
    <rect class="box" x="90" y="245" width="270" height="128" rx="6"/><text class="small" x="225" y="304" text-anchor="middle"><tspan x="225" dy="0">Store 1</tspan><tspan x="225" dy="18">承载多个 Region 的 Peer</tspan></text>
    <rect class="box" x="425" y="245" width="270" height="128" rx="6"/><text class="small" x="560" y="304" text-anchor="middle"><tspan x="560" dy="0">Store 2</tspan><tspan x="560" dy="18">承载多个 Region 的 Peer</tspan></text>
    <rect class="box" x="760" y="245" width="270" height="128" rx="6"/><text class="small" x="895" y="304" text-anchor="middle"><tspan x="895" dy="0">Store 3</tspan><tspan x="895" dy="18">承载多个 Region 的 Peer</tspan></text>
    <rect class="green" x="125" y="295" width="90" height="42" rx="6"/><text class="small" x="170" y="320" text-anchor="middle"><tspan x="170" dy="0">R1 Peer</tspan></text><rect class="amber" x="235" y="295" width="90" height="42" rx="6"/><text class="small" x="280" y="320" text-anchor="middle"><tspan x="280" dy="0">R2 Peer</tspan></text>
    <rect class="green" x="460" y="295" width="90" height="42" rx="6"/><text class="small" x="505" y="320" text-anchor="middle"><tspan x="505" dy="0">R1 Peer</tspan></text><rect class="red" x="570" y="295" width="90" height="42" rx="6"/><text class="small" x="615" y="320" text-anchor="middle"><tspan x="615" dy="0">R3 Peer</tspan></text>
    <rect class="amber" x="795" y="295" width="90" height="42" rx="6"/><text class="small" x="840" y="320" text-anchor="middle"><tspan x="840" dy="0">R2 Peer</tspan></text><rect class="red" x="905" y="295" width="90" height="42" rx="6"/><text class="small" x="950" y="320" text-anchor="middle"><tspan x="950" dy="0">R3 Peer</tspan></text>
    <rect class="green" x="165" y="460" width="170" height="74" rx="6"/><text class="small" x="250" y="483" text-anchor="middle"><tspan x="250" dy="0">Region 1</tspan><tspan x="250" dy="18">[a, h)</tspan><tspan x="250" dy="18">一个 Raft group</tspan></text>
    <rect class="amber" x="475" y="460" width="170" height="74" rx="6"/><text class="small" x="560" y="483" text-anchor="middle"><tspan x="560" dy="0">Region 2</tspan><tspan x="560" dy="18">[h, p)</tspan><tspan x="560" dy="18">一个 Raft group</tspan></text>
    <rect class="red" x="785" y="460" width="170" height="74" rx="6"/><text class="small" x="870" y="483" text-anchor="middle"><tspan x="870" dy="0">Region 3</tspan><tspan x="870" dy="18">[p, z)</tspan><tspan x="870" dy="18">一个 Raft group</tspan></text>
    <path class="arrow dashed" d="M 520 178 L 220 245"/><text class="small" x="370" y="199.5" text-anchor="middle"><tspan x="370" dy="0">收集状态</tspan></text><path class="arrow dashed" d="M 560 178 L 560 245"/><path class="arrow dashed" d="M 600 178 L 900 245"/><text class="small" x="750" y="199.5" text-anchor="middle"><tspan x="750" dy="0">下发调度</tspan></text>
    <path class="arrow" d="M 170 337 L 250 460"/><path class="arrow" d="M 505 337 L 250 460"/>
    <path class="arrow" d="M 280 337 L 560 460"/><path class="arrow" d="M 840 337 L 560 460"/>
    <path class="arrow" d="M 615 337 L 870 460"/><path class="arrow" d="M 950 337 L 870 460"/>
    <text class="caption" x="560" y="575" text-anchor="middle">Store 是机器/进程，Region 是 key range，Peer 是某个 Region 在某个 Store 上的一份副本。</text>
  
</svg>
