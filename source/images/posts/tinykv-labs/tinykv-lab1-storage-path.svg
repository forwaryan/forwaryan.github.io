<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-label="Lab1：Raw KV 请求如何落到 BadgerDB">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1000" height="430" rx="0"/>
  <rect class="panel" x="24" y="24" width="952" height="382" rx="14" filter="url(#shadow)"/>
  <text class="title" x="500" y="60" text-anchor="middle">Lab1：Raw KV 请求如何落到 BadgerDB</text>
  
    <rect class="blue" x="70" y="150" width="165" height="84" rx="8"/><text class="label" x="152.5" y="186" text-anchor="middle"><tspan x="152.5" dy="0">Client</tspan><tspan x="152.5" dy="22">Raw 请求</tspan></text>
    <rect class="box" x="295" y="150" width="165" height="84" rx="8"/><text class="label" x="377.5" y="186" text-anchor="middle"><tspan x="377.5" dy="0">Raw API</tspan><tspan x="377.5" dy="22">Get / Put / Scan</tspan></text>
    <rect class="green" x="520" y="135" width="190" height="114" rx="8"/><text class="label" x="615" y="175" text-anchor="middle"><tspan x="615" dy="0">StandaloneStorage</tspan><tspan x="615" dy="22">Reader / Write</tspan><tspan x="615" dy="22">Snapshot 视图</tspan></text>
    <rect class="amber" x="775" y="150" width="165" height="84" rx="8"/><text class="label" x="857.5" y="186" text-anchor="middle"><tspan x="857.5" dy="0">BadgerDB</tspan><tspan x="857.5" dy="22">本地持久化</tspan></text>
    <path class="arrow" d="M 235 192 L 295 192"/><path class="arrow" d="M 460 192 L 520 192"/><path class="arrow" d="M 710 192 L 775 192"/>
    <rect class="box" x="526" y="295" width="180" height="54" rx="6"/><text class="small" x="616" y="317" text-anchor="middle"><tspan x="616" dy="0">CF 前缀封装</tspan><tspan x="616" dy="18">default / write / lock</tspan></text>
    <path class="arrow dashed" d="M 615 249 L 615 295"/>
    <text class="caption" x="500" y="380" text-anchor="middle">Lab1 不处理复制，也不处理事务；它先把“读写底层引擎”这件事做稳。</text>
  
</svg>
