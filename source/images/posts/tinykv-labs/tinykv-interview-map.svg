<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-label="面经问题按 TinyKV Lab 反查">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="520" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="472" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">面经问题按 TinyKV Lab 反查</text>
  
    <rect class="blue" x="70" y="115" width="190" height="78" rx="8"/><text class="label" x="165" y="148" text-anchor="middle"><tspan x="165" dy="0">面经问题</tspan><tspan x="165" dy="22">Raft / 事务 / LSM</tspan></text>
    <rect class="box" x="335" y="115" width="175" height="78" rx="8"/><text class="label" x="422.5" y="148" text-anchor="middle"><tspan x="422.5" dy="0">归类</tspan><tspan x="422.5" dy="22">先找系统层级</tspan></text>
    <rect class="green" x="585" y="115" width="185" height="78" rx="8"/><text class="label" x="677.5" y="148" text-anchor="middle"><tspan x="677.5" dy="0">定位 Lab</tspan><tspan x="677.5" dy="22">再落到文件和流程</tspan></text>
    <rect class="amber" x="845" y="115" width="190" height="78" rx="8"/><text class="label" x="940" y="148" text-anchor="middle"><tspan x="940" dy="0">回答</tspan><tspan x="940" dy="22">机制 + 异常 + 取舍</tspan></text>
    <path class="arrow" d="M 260 154 L 335 154"/><path class="arrow" d="M 510 154 L 585 154"/><path class="arrow" d="M 770 154 L 845 154"/>
    <rect class="box" x="100" y="300" width="150" height="58" rx="6"/><text class="small" x="175" y="324" text-anchor="middle"><tspan x="175" dy="0">Lab1</tspan><tspan x="175" dy="18">Badger / Raw API</tspan></text>
    <rect class="box" x="300" y="300" width="150" height="58" rx="6"/><text class="small" x="375" y="324" text-anchor="middle"><tspan x="375" dy="0">Lab2</tspan><tspan x="375" dy="18">Raft / Snapshot</tspan></text>
    <rect class="box" x="500" y="300" width="150" height="58" rx="6"/><text class="small" x="575" y="324" text-anchor="middle"><tspan x="575" dy="0">Lab3</tspan><tspan x="575" dy="18">Region / Scheduler</tspan></text>
    <rect class="box" x="700" y="300" width="150" height="58" rx="6"/><text class="small" x="775" y="324" text-anchor="middle"><tspan x="775" dy="0">Lab4</tspan><tspan x="775" dy="18">MVCC / Percolator</tspan></text>
    <rect class="box" x="900" y="300" width="150" height="58" rx="6"/><text class="small" x="975" y="324" text-anchor="middle"><tspan x="975" dy="0">外延</tspan><tspan x="975" dy="18">LSM / ReadIndex</tspan></text>
    <text class="caption" x="560" y="430" text-anchor="middle">面试时不要把所有问题都硬贴到 Raft；先判断它属于存储、复制、分片、事务，还是项目外延。</text>
  
</svg>
