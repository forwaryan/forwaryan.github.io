<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-label="TinyKV 阅读清单：按系统层次往上读">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1000" height="580" rx="0"/>
  <rect class="panel" x="24" y="24" width="952" height="532" rx="14" filter="url(#shadow)"/>
  <text class="title" x="500" y="60" text-anchor="middle">TinyKV 阅读清单：按系统层次往上读</text>
  
    <rect class="blue" x="185" y="105" width="630" height="64" rx="8"/><text class="label" x="500" y="131" text-anchor="middle"><tspan x="500" dy="0">应用入口</tspan><tspan x="500" dy="22">TinySQL / client request / gRPC</tspan></text>
    <rect class="red" x="185" y="185" width="630" height="64" rx="8"/><text class="label" x="500" y="211" text-anchor="middle"><tspan x="500" dy="0">事务</tspan><tspan x="500" dy="22">ACID / Snapshot Isolation / Percolator</tspan></text>
    <rect class="amber" x="185" y="265" width="630" height="64" rx="8"/><text class="label" x="500" y="291" text-anchor="middle"><tspan x="500" dy="0">分片与调度</tspan><tspan x="500" dy="22">Range sharding / Multi-Raft / Balance</tspan></text>
    <rect class="green" x="185" y="345" width="630" height="64" rx="8"/><text class="label" x="500" y="371" text-anchor="middle"><tspan x="500" dy="0">复制与一致性</tspan><tspan x="500" dy="22">Raft / Quorum / CAP / PACELC</tspan></text>
    <rect class="box" x="185" y="425" width="630" height="64" rx="8"/><text class="label" x="500" y="451" text-anchor="middle"><tspan x="500" dy="0">本地存储</tspan><tspan x="500" dy="22">LSM / Badger / I/O / Compaction</tspan></text>
    <path class="arrow" d="M 500 425 L 500 409"/><path class="arrow" d="M 500 345 L 500 329"/><path class="arrow" d="M 500 265 L 500 249"/><path class="arrow" d="M 500 185 L 500 169"/>
    <text class="caption" x="500" y="535" text-anchor="middle">阅读顺序可以从底层往上，也可以跟着 Lab 走；关键是把每篇材料放回它服务的系统层次。</text>
  
</svg>
