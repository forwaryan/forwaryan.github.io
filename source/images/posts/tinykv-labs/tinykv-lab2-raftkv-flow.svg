<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-label="Lab2：写请求先进入 Raft，再 apply 到状态机">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .page{fill:#f8fafc}.panel{fill:#ffffff;stroke:#d8e0ec;stroke-width:1.4}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#0f172a}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827}.small{font:400 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4}.blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:1.6}.green{fill:#ecfdf5;stroke:#34d399;stroke-width:1.5}.amber{fill:#fffbeb;stroke:#f59e0b;stroke-width:1.5}.red{fill:#fef2f2;stroke:#f87171;stroke-width:1.4}.arrow{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}.dashed{stroke-dasharray:6 5}.muted{fill:#64748b}.caption{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  </style>
  <rect class="page" width="1120" height="520" rx="0"/>
  <rect class="panel" x="24" y="24" width="1072" height="472" rx="14" filter="url(#shadow)"/>
  <text class="title" x="560" y="60" text-anchor="middle">Lab2：写请求先进入 Raft，再 apply 到状态机</text>
  
    <rect class="blue" x="70" y="140" width="155" height="82" rx="8"/><text class="label" x="147.5" y="175" text-anchor="middle"><tspan x="147.5" dy="0">Client</tspan><tspan x="147.5" dy="22">RawPut</tspan></text>
    <rect class="box" x="285" y="140" width="170" height="82" rx="8"/><text class="label" x="370" y="175" text-anchor="middle"><tspan x="370" dy="0">RaftStorage</tspan><tspan x="370" dy="22">propose command</tspan></text>
    <rect class="green" x="515" y="130" width="185" height="102" rx="8"/><text class="label" x="607.5" y="164" text-anchor="middle"><tspan x="607.5" dy="0">Raft log</tspan><tspan x="607.5" dy="22">leader 排序</tspan><tspan x="607.5" dy="22">多数派复制</tspan></text>
    <rect class="amber" x="770" y="140" width="155" height="82" rx="8"/><text class="label" x="847.5" y="175" text-anchor="middle"><tspan x="847.5" dy="0">Apply</tspan><tspan x="847.5" dy="22">执行 entry</tspan></text>
    <rect class="box" x="975" y="140" width="110" height="82" rx="8"/><text class="label" x="1030" y="175" text-anchor="middle"><tspan x="1030" dy="0">BadgerDB</tspan><tspan x="1030" dy="22">落盘</tspan></text>
    <path class="arrow" d="M 225 181 L 285 181"/><path class="arrow" d="M 455 181 L 515 181"/><path class="arrow" d="M 700 181 L 770 181"/><path class="arrow" d="M 925 181 L 975 181"/>
    <rect class="box" x="505" y="300" width="120" height="52" rx="6"/><text class="small" x="565" y="321" text-anchor="middle"><tspan x="565" dy="0">Peer 1</tspan><tspan x="565" dy="18">match index</tspan></text><rect class="box" x="660" y="300" width="120" height="52" rx="6"/><text class="small" x="720" y="321" text-anchor="middle"><tspan x="720" dy="0">Peer 2</tspan><tspan x="720" dy="18">match index</tspan></text><rect class="box" x="815" y="300" width="120" height="52" rx="6"/><text class="small" x="875" y="321" text-anchor="middle"><tspan x="875" dy="0">Peer 3</tspan><tspan x="875" dy="18">match index</tspan></text>
    <path class="arrow dashed" d="M 605 232 L 565 300"/><path class="arrow dashed" d="M 615 232 L 720 300"/><path class="arrow dashed" d="M 625 232 L 875 300"/>
    <rect class="box" x="355" y="330" width="185" height="58" rx="6"/><text class="small" x="447.5" y="354" text-anchor="middle"><tspan x="447.5" dy="0">Ready</tspan><tspan x="447.5" dy="18">entries / messages / committed</tspan></text>
    <path class="arrow dashed" d="M 535 330 L 440 222"/><text class="small" x="487.5" y="264" text-anchor="middle"><tspan x="487.5" dy="0">上层负责 IO</tspan></text>
    <text class="caption" x="560" y="445" text-anchor="middle">Raft 层不直接写网络和磁盘，它把工作打包成 Ready；raftstore 再按顺序持久化、发送、apply。</text>
  
</svg>
